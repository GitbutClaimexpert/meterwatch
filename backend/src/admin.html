<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeterWatch Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
  .login-box h1 { color: #f5a623; font-size: 1.6rem; margin-bottom: 6px; }
  .login-box p { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
  input[type=password], input[type=text] { width: 100%; padding: 12px 16px; background: #0f1117; border: 1px solid #2a2d3e; border-radius: 8px; color: #e0e0e0; font-size: 1rem; margin-bottom: 14px; outline: none; }
  input:focus { border-color: #f5a623; }
  .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #f5a623; color: #000; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-sm { padding: 6px 14px; font-size: 0.8rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
  .btn-sm-danger { background: #e74c3c; color: #fff; }
  .btn-sm-gray { background: #2a2d3e; color: #ccc; }
  .error { color: #e74c3c; font-size: 0.9rem; margin-top: 8px; }
  .hidden { display: none; }

  /* Dashboard */
  header { background: #1a1d2e; border-bottom: 1px solid #2a2d3e; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { color: #f5a623; font-size: 1.3rem; }
  header .logout { background: #2a2d3e; border: none; color: #ccc; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
  header .logout:hover { background: #3a3d4e; }
  .tabs { display: flex; gap: 4px; padding: 20px 24px 0; border-bottom: 1px solid #2a2d3e; }
  .tab { padding: 10px 20px; background: none; border: none; color: #888; cursor: pointer; font-size: 0.95rem; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: color 0.2s; }
  .tab.active { color: #f5a623; border-bottom-color: #f5a623; }
  .tab-content { padding: 24px; }
  .section-actions { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
  .count-badge { background: #2a2d3e; color: #aaa; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; }

  /* Cards */
  .card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
  .card-header { padding: 16px 20px; display: flex; align-items: flex-start; gap: 16px; }
  .meter-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #2a2d3e; flex-shrink: 0; cursor: pointer; }
  .meter-thumb:hover { border-color: #f5a623; }
  .card-info { flex: 1; }
  .card-reading { font-size: 1.5rem; font-weight: 700; color: #fff; }
  .card-meta { font-size: 0.8rem; color: #888; margin-top: 4px; line-height: 1.7; }
  .card-meta span { margin-right: 12px; }
  .card-actions { display: flex; gap: 8px; margin-top: 10px; }
  .flag-badge { display: inline-block; background: #e74c3c22; color: #e74c3c; border: 1px solid #e74c3c44; border-radius: 6px; padding: 2px 8px; font-size: 0.75rem; margin: 2px; }
  .flag-ok { background: #27ae6022; color: #27ae60; border-color: #27ae6044; }
  .proof-box { background: #0f1117; border-top: 1px solid #2a2d3e; padding: 12px 20px; font-size: 0.72rem; color: #666; font-family: monospace; word-break: break-all; display: none; }

  /* Audit */
  .audit-row { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
  .audit-event { font-weight: 700; font-size: 0.8rem; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
  .ev-success { background: #27ae6022; color: #27ae60; }
  .ev-attempt { background: #f5a62322; color: #f5a623; }
  .ev-fraud { background: #e74c3c22; color: #e74c3c; }
  .ev-admin { background: #8e44ad22; color: #9b59b6; }
  .ev-other { background: #2a2d3e; color: #aaa; }
  .audit-detail { font-size: 0.8rem; color: #888; }
  .audit-ts { font-size: 0.75rem; color: #555; margin-top: 2px; }

  /* Image modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
  .modal-close { position: absolute; top: 20px; right: 24px; background: #fff; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 1.2rem; cursor: pointer; }

  .empty { text-align: center; color: #555; padding: 60px 20px; font-size: 1rem; }
  .spinner { text-align: center; color: #f5a623; padding: 40px; }

  @media (max-width: 600px) {
    .card-reading { font-size: 1.2rem; }
    .tabs { overflow-x: auto; }
    header h1 { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>⚡ MeterWatch</h1>
    <p>Admin Portal — enter your password to continue</p>
    <input type="password" id="pwInput" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">Login</button>
    <div class="error hidden" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="hidden" id="dashboard">
  <header>
    <h1>⚡ MeterWatch Admin</h1>
    <button class="logout" onclick="doLogout()">Log out</button>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="showTab('readings')">Readings</button>
    <button class="tab" onclick="showTab('statements')">Statements</button>
    <button class="tab" onclick="showTab('audit')">Audit Log</button>
  </div>

  <!-- READINGS TAB -->
  <div class="tab-content" id="tab-readings">
    <div class="section-actions">
      <span class="count-badge" id="readingsCount">Loading...</span>
      <button class="btn-sm btn-sm-gray" onclick="loadReadings()">↻ Refresh</button>
      <button class="btn-sm btn-sm-danger" onclick="deleteAllReadings()">🗑 Delete All Readings</button>
    </div>
    <div id="readingsList"><div class="spinner">Loading...</div></div>
  </div>

  <!-- STATEMENTS TAB -->
  <div class="tab-content hidden" id="tab-statements">
    <div class="section-actions">
      <span class="count-badge" id="statementsCount">Loading...</span>
      <button class="btn-sm btn-sm-gray" onclick="loadStatements()">↻ Refresh</button>
    </div>
    <div id="statementsList"><div class="spinner">Loading...</div></div>
  </div>

  <!-- AUDIT TAB -->
  <div class="tab-content hidden" id="tab-audit">
    <div class="section-actions">
      <span class="count-badge" id="auditCount">Loading...</span>
      <button class="btn-sm btn-sm-gray" onclick="loadAudit()">↻ Refresh</button>
      <button class="btn-sm btn-sm-danger" onclick="clearAudit()">🗑 Clear Audit Log</button>
    </div>
    <div id="auditList"><div class="spinner">Loading...</div></div>
  </div>
</div>

<!-- IMAGE MODAL -->
<div class="modal hidden" id="imgModal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img id="modalImg" src="" alt="Meter photo">
</div>

<script>
const API = window.location.origin;
let token = sessionStorage.getItem('mw_admin_token') || '';

function eventClass(ev) {
  if (ev.includes('SUCCESS')) return 'ev-success';
  if (ev.includes('ATTEMPT')) return 'ev-attempt';
  if (ev.includes('FRAUD') || ev.includes('ERROR')) return 'ev-fraud';
  if (ev.includes('ADMIN')) return 'ev-admin';
  return 'ev-other';
}

function fmtDate(ts) {
  return new Date(ts).toLocaleString('en-ZA', { dateStyle: 'medium', timeStyle: 'short' });
}

async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  err.classList.add('hidden');
  try {
    const r = await fetch(API + '/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Wrong password'; err.classList.remove('hidden'); return; }
    token = d.token;
    sessionStorage.setItem('mw_admin_token', token);
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadReadings();
    loadStatements();
    loadAudit();
  } catch(e) {
    err.textContent = 'Connection error: ' + e.message;
    err.classList.remove('hidden');
  }
}

function doLogout() {
  token = '';
  sessionStorage.removeItem('mw_admin_token');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('loginWrap').classList.remove('hidden');
  document.getElementById('pwInput').value = '';
}

function adminHeaders() {
  return { 'x-admin-token': token };
}

function showTab(name) {
  ['readings','statements','audit'].forEach(t => {
    document.getElementById('tab-' + t).classList.add('hidden');
    document.querySelectorAll('.tab')[['readings','statements','audit'].indexOf(t)].classList.remove('active');
  });
  document.getElementById('tab-' + name).classList.remove('hidden');
  document.querySelectorAll('.tab')[['readings','statements','audit'].indexOf(name)].classList.add('active');
}

async function loadReadings() {
  const el = document.getElementById('readingsList');
  el.innerHTML = '<div class="spinner">Loading...</div>';
  try {
    const r = await fetch(API + '/api/admin/readings', { headers: adminHeaders() });
    if (r.status === 401) { doLogout(); return; }
    const rows = await r.json();
    document.getElementById('readingsCount').textContent = rows.length + ' reading' + (rows.length !== 1 ? 's' : '');
    if (!rows.length) { el.innerHTML = '<div class="empty">No readings yet</div>'; return; }
    el.innerHTML = rows.map(r => {
      const flags = Array.isArray(r.fraudFlags) ? r.fraudFlags : [];
      const flagHtml = flags.length
        ? flags.map(f => '<span class="flag-badge">' + f + '</span>').join('')
        : '<span class="flag-badge flag-ok">✓ No flags</span>';
      const imgSrc = API + r.imagePath;
      return '<div class="card" id="card-' + r.id + '">' +
        '<div class="card-header">' +
          '<img class="meter-thumb" src="' + imgSrc + '" onclick="openModal(\'' + imgSrc + '\')" title="Click to enlarge">' +
          '<div class="card-info">' +
            '<div class="card-reading">' + (r.reading_kwh || '—') + ' kWh</div>' +
            '<div class="card-meta">' +
              '<span>📅 ' + fmtDate(r.server_ts) + '</span>' +
              '<span>👤 ' + (r.user_id || 'unknown') + '</span>' +
              '<span>🤖 ' + (r.reading_source || '—') + '</span>' +
              (r.gps_lat ? '<span>📍 ' + r.gps_lat.toFixed(4) + ', ' + r.gps_lng.toFixed(4) + '</span>' : '') +
            '</div>' +
            '<div style="margin-top:6px">' + flagHtml + '</div>' +
            '<div class="card-actions">' +
              '<button class="btn-sm btn-sm-gray" onclick="toggleProof(\'' + r.id + '\')">🔐 Proof</button>' +
              '<button class="btn-sm btn-sm-danger" onclick="deleteReading(\'' + r.id + '\')">🗑 Delete</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="proof-box" id="proof-' + r.id + '">' +
          '<strong>Proof payload:</strong><br>' + (r.proof && r.proof.payload ? r.proof.payload : 'N/A') + '<br><br>' +
          '<strong>HMAC:</strong><br>' + (r.proof && r.proof.hmac ? r.proof.hmac : 'N/A') + '<br><br>' +
          '<strong>Image SHA-256:</strong><br>' + (r.image_hash || 'N/A') +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
  }
}

async function loadStatements() {
  const el = document.getElementById('statementsList');
  el.innerHTML = '<div class="spinner">Loading...</div>';
  try {
    const r = await fetch(API + '/api/admin/statements', { headers: adminHeaders() });
    if (r.status === 401) { doLogout(); return; }
    const rows = await r.json();
    document.getElementById('statementsCount').textContent = rows.length + ' statement' + (rows.length !== 1 ? 's' : '');
    if (!rows.length) { el.innerHTML = '<div class="empty">No statements uploaded yet</div>'; return; }
    el.innerHTML = rows.map(s => {
      const parsed = s.raw_json ? JSON.parse(s.raw_json) : {};
      return '<div class="card">' +
        '<div class="card-header">' +
          '<div class="card-info">' +
            '<div class="card-reading" style="font-size:1.1rem">' + (s.municipality || 'Municipality unknown') + '</div>' +
            '<div class="card-meta">' +
              '<span>📅 Uploaded: ' + fmtDate(s.server_ts) + '</span>' +
              '<span>📋 Period: ' + (s.billing_start || '?') + ' → ' + (s.billing_end || '?') + '</span>' +
              '<span>⚡ Units: ' + (s.units_consumed || '?') + ' kWh</span>' +
              '<span>💰 Amount: R' + (s.amount_due || '?') + '</span>' +
              '<span>📖 Type: ' + (s.reading_type || '?') + '</span>' +
              '<span>👤 ' + (s.user_id || 'unknown') + '</span>' +
            '</div>' +
            '<div class="card-actions" style="margin-top:10px">' +
              '<button class="btn-sm btn-sm-danger" onclick="deleteStatement(\'' + s.id + '\')">🗑 Delete</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
  }
}

async function loadAudit() {
  const el = document.getElementById('auditList');
  el.innerHTML = '<div class="spinner">Loading...</div>';
  try {
    const r = await fetch(API + '/api/admin/audit', { headers: adminHeaders() });
    if (r.status === 401) { doLogout(); return; }
    const rows = await r.json();
    document.getElementById('auditCount').textContent = rows.length + ' entries';
    if (!rows.length) { el.innerHTML = '<div class="empty">Audit log is empty</div>'; return; }
    el.innerHTML = rows.map(a => {
      let detail = '';
      try { detail = JSON.stringify(JSON.parse(a.details), null, 0).slice(0, 120); } catch { detail = a.details || ''; }
      return '<div class="audit-row">' +
        '<span class="audit-event ' + eventClass(a.event) + '">' + a.event + '</span>' +
        '<div>' +
          '<div class="audit-detail">' + detail + (a.ip ? ' · IP: ' + a.ip : '') + '</div>' +
          '<div class="audit-ts">' + fmtDate(a.server_ts) + ' · User: ' + (a.user_id || 'anon') + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
  }
}

function toggleProof(id) {
  const el = document.getElementById('proof-' + id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

async function deleteReading(id) {
  if (!confirm('Delete this reading and its photo? This cannot be undone.')) return;
  const r = await fetch(API + '/api/admin/readings/' + id, { method: 'DELETE', headers: adminHeaders() });
  if (r.ok) { document.getElementById('card-' + id).remove(); loadReadings(); }
  else alert('Delete failed');
}

async function deleteAllReadings() {
  if (!confirm('Delete ALL readings and photos? This cannot be undone.')) return;
  const r = await fetch(API + '/api/admin/readings', { method: 'DELETE', headers: adminHeaders() });
  if (r.ok) { const d = await r.json(); alert('Deleted ' + d.deleted + ' readings.'); loadReadings(); }
  else alert('Delete failed');
}

async function deleteStatement(id) {
  if (!confirm('Delete this statement? This cannot be undone.')) return;
  const r = await fetch(API + '/api/admin/statements/' + id, { method: 'DELETE', headers: adminHeaders() });
  if (r.ok) loadStatements();
  else alert('Delete failed');
}

async function clearAudit() {
  if (!confirm('Clear the entire audit log? This cannot be undone.')) return;
  const r = await fetch(API + '/api/admin/audit', { method: 'DELETE', headers: adminHeaders() });
  if (r.ok) loadAudit();
  else alert('Failed');
}

function openModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('imgModal').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('imgModal').classList.add('hidden');
}

// Auto-login if token exists in session
if (token) {
  document.getElementById('loginWrap').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  loadReadings(); loadStatements(); loadAudit();
}
</script>
</body>
</html>
