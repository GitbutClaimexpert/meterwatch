<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeterWatch Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
  .login-box h1 { color: #f5a623; font-size: 1.6rem; margin-bottom: 6px; }
  .login-box p { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
  input[type=text], input[type=password] { width: 100%; padding: 12px 16px; background: #0f1117; border: 1px solid #2a2d3e; border-radius: 8px; color: #e0e0e0; font-size: 1rem; margin-bottom: 14px; }
  input:focus { border-color: #f5a623; outline: none; }
  .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #f5a623; color: #000; }
  .btn-danger  { background: #e74c3c; color: #fff; }
  .btn-sm      { padding: 6px 14px; font-size: 0.8rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
  .btn-sm-danger { background: #e74c3c; color: #fff; }
  .btn-sm-gray   { background: #2a2d3e; color: #ccc; }
  .btn-sm-blue   { background: #2266cc; color: #fff; }
  .btn-sm-wipe   { background: #cc0000; color: #fff; font-size: 0.85rem; padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; }
  .error  { color: #e74c3c; font-size: 0.9rem; margin-top: 8px; }
  .hidden { display: none; }

  /* Dashboard */
  .dash { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: gap; gap: 12px; }
  .dash-header h1 { color: #f5a623; font-size: 1.4rem; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 8px 18px; border-radius: 8px; border: 1px solid #2a2d3e; background: #1a1d2e; color: #888; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
  .tab.active { background: #f5a623; color: #000; border-color: #f5a623; }
  .card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card h2 { color: #f5a623; font-size: 1rem; margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th { background: #0f1117; color: #888; padding: 8px 10px; text-align: left; border-bottom: 1px solid #2a2d3e; }
  td { padding: 8px 10px; border-bottom: 1px solid #1e2132; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
  .badge-green  { background: #1a3a1a; color: #4caf50; }
  .badge-orange { background: #3a2a0a; color: #f5a623; }
  .badge-red    { background: #3a0a0a; color: #e74c3c; }
  .badge-blue   { background: #0a1a3a; color: #64b5f6; }
  .wipe-bar { background: #2a0a0a; border: 1px solid #cc0000; border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .wipe-bar p { color: #ff8888; font-size: 0.85rem; }
  .photo-modal { display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center; }
  .photo-modal.open { display:flex; }
  .photo-inner { background:#1a1d2e;border-radius:12px;padding:20px;max-width:90vw;max-height:90vh;overflow:auto;text-align:center; }
  .photo-inner img { max-width:100%;max-height:70vh;border-radius:8px;border:2px solid #2a2d3e; }
  .photo-inner h3 { color:#f5a623;margin-bottom:8px; }
  .photo-inner p  { color:#888;font-size:0.8rem;margin:4px 0;word-break:break-all; }
  .close-btn { margin-top:14px;background:#2a2d3e;color:#ccc;border:none;padding:8px 20px;border-radius:6px;cursor:pointer; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>⚡ MeterWatch</h1>
    <p>Admin Portal</p>
    <input type="password" id="pwInput" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn btn-primary" onclick="login()">Sign In</button>
    <div class="error hidden" id="loginErr"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="dash hidden" id="dashboard">
  <div class="dash-header">
    <h1>⚡ MeterWatch Admin</h1>
    <button class="btn-sm btn-sm-gray" onclick="logout()">Sign Out</button>
  </div>

  <!-- WIPE BAR -->
  <div class="wipe-bar">
    <p>🗑️ <strong>Reset for testing:</strong> Permanently delete all readings, statements and audit logs</p>
    <button class="btn-sm-wipe" onclick="wipeAll()">🗑️ Wipe All Data</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('readings',this)">Readings</div>
    <div class="tab" onclick="showTab('statements',this)">Statements</div>
    <div class="tab" onclick="showTab('audit',this)">Audit Log</div>
  </div>

  <!-- Readings tab -->
  <div id="tab-readings">
    <div class="card">
      <h2>Meter Readings</h2>
      <div id="readingsTable">Loading...</div>
    </div>
  </div>

  <!-- Statements tab -->
  <div id="tab-statements" class="hidden">
    <div class="card">
      <h2>Uploaded Statements</h2>
      <div id="statementsTable">Loading...</div>
    </div>
  </div>

  <!-- Audit tab -->
  <div id="tab-audit" class="hidden">
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0">
      <h2 style="margin:0">Audit Log</h2>
      <button class="btn-sm btn-sm-danger" onclick="clearAudit()">Clear Log</button>
    </div>
    <div class="card" style="margin-top:8px">
      <div id="auditTable">Loading...</div>
    </div>
  </div>
</div>

<!-- Photo modal -->
<div class="photo-modal" id="photoModal">
  <div class="photo-inner">
    <h3 id="photoTitle">Meter Photo</h3>
    <p id="photoMeta"></p>
    <img id="photoImg" src="" alt="Meter photo"/>
    <p id="photoHash" style="color:#555;margin-top:8px"></p>
    <button class="close-btn" onclick="closePhoto()">Close</button>
  </div>
</div>

<script>
  const API = window.location.origin;
  let TOKEN = sessionStorage.getItem('adminToken') || '';

  function headers() {
    return { 'Content-Type': 'application/json', 'x-admin-token': TOKEN };
  }

  async function login() {
    const pw = document.getElementById('pwInput').value;
    try {
      const r = await fetch(API + '/api/admin/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password: pw}) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Login failed');
      TOKEN = d.token;
      sessionStorage.setItem('adminToken', TOKEN);
      document.getElementById('loginWrap').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      loadAll();
    } catch(e) {
      const el = document.getElementById('loginErr');
      el.textContent = e.message;
      el.classList.remove('hidden');
    }
  }

  function logout() {
    sessionStorage.removeItem('adminToken');
    location.reload();
  }

  function showTab(name, el) {
    ['readings','statements','audit'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('hidden', t !== name);
    });
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (name === 'audit') loadAudit();
  }

  async function loadAll() {
    loadReadings();
    loadStatements();
  }

  // ── Readings ──────────────────────────────────────────────────────────────
  async function loadReadings() {
    const el = document.getElementById('readingsTable');
    try {
      const r = await fetch(API + '/api/admin/readings', { headers: headers() });
      const rows = await r.json();
      if (!rows.length) { el.innerHTML = '<p style="color:#888;padding:10px">No readings yet.</p>'; return; }
      el.innerHTML = '<table><thead><tr>' +
        '<th>Date</th><th>Meter No.</th><th>Reading kWh</th><th>Source</th><th>Flags</th><th>Photo</th><th>Delete</th>' +
        '</tr></thead><tbody>' +
        rows.map(r => {
          const d   = new Date(r.server_ts).toLocaleString('en-ZA');
          const src = r.reading_source || 'UNKNOWN';
          const srcBadge = src === 'AI_CONFIRMED' ? 'badge-green' : src === 'MANUAL' ? 'badge-blue' : 'badge-orange';
          const flags = (r.fraudFlags||[]).length ? '<span class="badge badge-red">' + r.fraudFlags.length + ' flag(s)</span>' : '<span class="badge badge-green">Clean</span>';
          return '<tr>' +
            '<td>' + d + '</td>' +
            '<td>' + (r.meter_number || '<span style="color:#555">—</span>') + '</td>' +
            '<td><strong>' + (r.reading_kwh ?? '?') + '</strong></td>' +
            '<td><span class="badge ' + srcBadge + '">' + src + '</span></td>' +
            '<td>' + flags + '</td>' +
            '<td><button class="btn-sm btn-sm-blue" onclick="viewPhoto(' + JSON.stringify(r.id) + ',' + JSON.stringify(r.imagePath) + ',' + JSON.stringify(r.image_hash) + ',' + JSON.stringify(d) + ',' + JSON.stringify(r.reading_kwh) + ',' + JSON.stringify(r.meter_number||'') + ')">📷</button></td>' +
            '<td><button class="btn-sm btn-sm-danger" onclick="deleteReading(' + JSON.stringify(r.id) + ')">✕</button></td>' +
            '</tr>';
        }).join('') +
        '</tbody></table>';
    } catch(e) { el.innerHTML = '<p style="color:#e74c3c">' + e.message + '</p>'; }
  }

  async function deleteReading(id) {
    if (!confirm('Delete this reading?')) return;
    await fetch(API + '/api/admin/readings/' + id, { method: 'DELETE', headers: headers() });
    loadReadings();
  }

  // ── Photo viewer ──────────────────────────────────────────────────────────
  function viewPhoto(id, path, hash, date, reading, meterNo) {
    document.getElementById('photoTitle').textContent = 'Meter Photo';
    document.getElementById('photoMeta').textContent =
      date + '  |  Reading: ' + (reading ?? '?') + ' kWh  |  Meter No: ' + (meterNo || 'unknown');
    document.getElementById('photoHash').textContent = 'SHA-256: ' + hash;
    document.getElementById('photoImg').src = API + path;
    document.getElementById('photoModal').classList.add('open');
  }

  function closePhoto() {
    document.getElementById('photoModal').classList.remove('open');
    document.getElementById('photoImg').src = '';
  }

  // ── Wipe all data ─────────────────────────────────────────────────────────
  async function wipeAll() {
    if (!confirm('DELETE ALL readings, statements and audit logs?\n\nThis permanently removes all data and images. Cannot be undone.')) return;
    try {
      const r = await fetch(API + '/api/admin/wipe', { method: 'DELETE', headers: headers() });
      const d = await r.json();
      alert(d.message || 'Done');
      loadAll();
      loadAudit();
    } catch(e) { alert('Error: ' + e.message); }
  }

  // ── Statements ────────────────────────────────────────────────────────────
  async function loadStatements() {
    const el = document.getElementById('statementsTable');
    try {
      const r = await fetch(API + '/api/admin/statements', { headers: headers() });
      const rows = await r.json();
      if (!rows.length) { el.innerHTML = '<p style="color:#888;padding:10px">No statements yet.</p>'; return; }
      el.innerHTML = '<table><thead><tr><th>Date</th><th>Account</th><th>Period</th><th>Units</th><th>Type</th><th>Amount</th><th>Delete</th></tr></thead><tbody>' +
        rows.map(s => '<tr>' +
          '<td>' + new Date(s.server_ts).toLocaleString('en-ZA') + '</td>' +
          '<td>' + (s.account_number||'—') + '</td>' +
          '<td>' + (s.billing_start||'?') + ' → ' + (s.billing_end||'?') + '</td>' +
          '<td>' + (s.units_consumed||'?') + ' kWh</td>' +
          '<td><span class="badge ' + (s.reading_type==='ESTIMATED'?'badge-orange':'badge-green') + '">' + (s.reading_type||'?') + '</span></td>' +
          '<td>R ' + (s.amount_due||'?') + '</td>' +
          '<td><button class="btn-sm btn-sm-danger" onclick="deleteStatement(' + JSON.stringify(s.id) + ')">✕</button></td>' +
          '</tr>'
        ).join('') + '</tbody></table>';
    } catch(e) { el.innerHTML = '<p style="color:#e74c3c">' + e.message + '</p>'; }
  }

  async function deleteStatement(id) {
    if (!confirm('Delete this statement?')) return;
    await fetch(API + '/api/admin/statements/' + id, { method: 'DELETE', headers: headers() });
    loadStatements();
  }

  // ── Audit log ─────────────────────────────────────────────────────────────
  async function loadAudit() {
    const el = document.getElementById('auditTable');
    try {
      const r = await fetch(API + '/api/admin/audit', { headers: headers() });
      const rows = await r.json();
      if (!rows.length) { el.innerHTML = '<p style="color:#888;padding:10px">No audit entries.</p>'; return; }
      el.innerHTML = '<table><thead><tr><th>Time</th><th>Event</th><th>User</th><th>Details</th><th>IP</th></tr></thead><tbody>' +
        rows.slice().reverse().map(a => '<tr>' +
          '<td>' + new Date(a.server_ts).toLocaleString('en-ZA') + '</td>' +
          '<td><span class="badge ' + (a.event.includes('ERROR')||a.event.includes('BLOCKED')?'badge-red':a.event.includes('SUCCESS')?'badge-green':'badge-orange') + '">' + a.event + '</span></td>' +
          '<td>' + (a.user_id||'—') + '</td>' +
          '<td style="font-size:0.75rem;color:#888">' + (a.details||'') + '</td>' +
          '<td>' + (a.ip||'—') + '</td>' +
          '</tr>'
        ).join('') + '</tbody></table>';
    } catch(e) { el.innerHTML = '<p style="color:#e74c3c">' + e.message + '</p>'; }
  }

  async function clearAudit() {
    if (!confirm('Clear all audit log entries?')) return;
    await fetch(API + '/api/admin/audit', { method: 'DELETE', headers: headers() });
    loadAudit();
  }

  // Auto-login if token in session
  if (TOKEN) {
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadAll();
  }
</script>
</body>
</html>
